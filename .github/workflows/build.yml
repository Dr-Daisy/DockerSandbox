name: Build Windows Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync

      - name: Build executable
        run: uv run pyinstaller DockerGUI.spec --clean -y

      - name: Zip distribution
        shell: powershell
        run: |
          cd dist
          Compress-Archive -Path DockerSandbox -DestinationPath ../DockerSandbox-windows.zip

      - name: Create Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: DockerSandbox-windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
